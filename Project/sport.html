<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Activities</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* Header */
header {
    background: #002b5c;
    color: white;
    text-align: center;
    padding: 20px;
}

/* Sports Container */
.sports-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 40px;
}

/* Card */
.sport-card {
    width: 250px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    transition: transform 0.3s;
}

.sport-card:hover {
    transform: scale(1.05);
}

/* Image */
.sport-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* Title */
.sport-card h3 {
    text-align: center;
    padding: 15px;
    margin: 0;
    background: #004080;
    color: white;
}

/* Footer */
footer {
    background: #002b5c;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<header>
    <h1>Sports Activities</h1>
    <p>Vidhya Sagar Global School</p>
</header>

<div class="sports-container">

    <!-- Football -->
    <div class="sport-card">
        <img src="foot.jpg">
        <h3>Football</h3>
    </div>

    <!-- Cricket -->
    <div class="sport-card">
        <img src="cric.jpg">
        <h3>Cricket</h3>
    </div>

    <!-- Basketball -->
    <div class="sport-card">
        <img src="bask.jpg">
        <h3>Basketball</h3>
    </div>

    <!-- Athletics -->
    <div class="sport-card">
        <img src="athletics.jpg">
        <h3>Athletics</h3>
    </div>

    <!-- Swimming -->
    <div class="sport-card">
        <img src="swim.jpg">
        <h3>Swimming</h3>
    </div>

    <!-- Yoga -->
    <div class="sport-card">
        <img src="yoga.jpg">
        <h3>Yoga</h3>
    </div>

</div>

<footer>
    <p>© 2026 Vidhya Sagar Global School</p>
</footer>

</body>
</html>
