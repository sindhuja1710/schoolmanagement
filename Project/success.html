<!DOCTYPE html>
<html>
<head>
<title>Login Success</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#74ebd5,#ACB6E5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    width:350px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    text-align:center;
}

.card h1{
    color:#28a745;
    margin-bottom:10px;
}

.card p{
    color:#555;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.btn:hover{
    background:#0056b3;
}
</style>

</head>

<body>

<div class="card">
    <h1>Login Successful ✅</h1>
    <p>Welcome to your dashboard</p>

    <a href="About.html" class="btn">Go to Dashboard</a>
</div>

</body>
</html>
