<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annual Day Celebrations</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: #fff0e6; /* Festive light background */
}

/* Header */
header {
    background: #708dec; /* Vibrant orange for celebration */
    color: white;
    text-align: center;
    padding: 25px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

header h1 {
    margin: 0;
    font-size: 2.5em;
}

header p {
    margin: 5px 0 0 0;
    font-size: 1.2em;
}

/* Events Container */
.events-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 40px;
}

/* Card */
.event-card {
    width: 260px;
    background: #fff3e6;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    transition: transform 0.3s, box-shadow 0.3s;
}

.event-card:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
}

/* Image */
.event-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* Title */
.event-card h3 {
    text-align: center;
    padding: 15px;
    margin: 0;
    background: #737575;
    color: white;
    font-family: 'Verdana', sans-serif;
}

/* Footer */
footer {
    background: #708dec;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 1em;
    margin-top: 40px;
}
</style>
</head>

<body>

<header>
    <h1>Annual Day Celebrations</h1>
    <p>Vidhya Sagar Global School</p>
</header>

<div class="events-container">

    <!-- Dance -->
    <div class="event-card">
        <img src="dance.jpg" alt="Dance Performance">
        <h3>Dance Performance</h3>
    </div>

    <!-- Music -->
    <div class="event-card">
        <img src="music.jpg" alt="Music Performance">
        <h3>Music Performance</h3>
    </div>

    <!-- Drama -->
    <div class="event-card">
        <img src="drama.jpg" alt="Drama Skit">
        <h3>Drama Skit</h3>
    </div>

    <!-- Fancy Dress -->
    <div class="event-card">
        <img src="fancydress.jpg" alt="Fancy Dress">
        <h3>Fancy Dress</h3>
    </div>

    <!-- Art Exhibition -->
    <div class="event-card">
        <img src="art.jpg" alt="Art Exhibition">
        <h3>Art Exhibition</h3>
    </div>

    <!-- Awards Ceremony -->
    <div class="event-card">
        <img src="award.jpg" alt="Awards Ceremony">
        <h3>Awards Ceremony</h3>
    </div>

</div>

<footer>
    <p>© 2026 Vidhya Sagar Global School</p>
</footer>

</body>
</html>
