<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Login</title>



<!-- particles library -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
}

/* particles background */

#particles-js{
position:absolute;
width:100%;
height:100%;
z-index:0;
}

/* container */

.container{
position:relative;
z-index:1;
}

/* glass card */

.card{

width:360px;
padding:40px;

background:rgba(255,255,255,0.05);

border-radius:15px;

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.1);

box-shadow:

0 0 15px #00f7ff,

0 0 30px #00f7ff inset;

color:white;

transition:0.2s;

}

/* 3D tilt effect */

.card:hover{

transform:rotateX(5deg) rotateY(5deg);

}

/* forms */

form{
display:flex;
flex-direction:column;
gap:20px;
}

#registerForm{
display:none;
}

/* floating input */

.input-box{
position:relative;
}

.input-box input{

width:100%;

padding:10px;

border:none;

border-bottom:2px solid #00f7ff;

background:transparent;

color:white;

outline:none;

}

.input-box label{

position:absolute;

top:10px;

left:0;

color:#aaa;

transition:0.3s;

}

.input-box input:focus + label,
.input-box input:valid + label{

top:-10px;

font-size:12px;

color:#00f7ff;

}

/* button */

button{

padding:10px;

border:none;

background:#00f7ff;

color:#000;

font-weight:bold;

border-radius:5px;

cursor:pointer;

box-shadow:0 0 10px #00f7ff;

}

/* links */

span{
color:#00f7ff;
cursor:pointer;
}

/* responsive */

@media(max-width:500px){

.card{
width:90%;
}

}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

<div class="card" id="card">

<h2 id="title">Login</h2>

<form id="loginForm">

<div class="input-box">
<input type="text" required>
<label>Username</label>
</div>

<div class="input-box">
<input type="password" required>
<label>Password</label>
</div>

<button>Login</button>

<p>
Don't have account?
<span onclick="showRegister()">Register</span>
</p>

</form>


<form id="registerForm">

<div class="input-box">
<input type="text" required>
<label>Name</label>
</div>

<div class="input-box">
<input type="email" required>
<label>Email</label>
</div>

<div class="input-box">
<input type="password" required>
<label>Password</label>
</div>

<button>Register</button>

<p>
Already have account?
<span onclick="showLogin()">Login</span>
</p>

</form>

</div>

</div>

<script>
    let loginForm = document.getElementById("loginForm")
let registerForm = document.getElementById("registerForm")
let title = document.getElementById("title")

function showRegister(){

loginForm.style.display="none"
registerForm.style.display="flex"
title.innerText="Register"

}

function showLogin(){

loginForm.style.display="flex"
registerForm.style.display="none"
title.innerText="Login"

}

/* particles */

particlesJS("particles-js", {

particles: {

number: { value: 80 },

color: { value: "#00f7ff" },

shape: { type: "circle" },

opacity: { value: 0.5 },

size: { value: 3 },

move: { enable: true, speed: 2 }

}

});
</script>

</body>
</html>
