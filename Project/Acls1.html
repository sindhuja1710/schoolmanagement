<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance Portal</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(to bottom, #2c3e50, #b0d3dd);
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #2c3e50;
    padding: 6px 12px;   /* reduced */
    color: white;
    height: 45px;        /* reduced */
}

.navbar h1 {
    font-size: 16px;     /* smaller */
    margin: 0;
}

#navMenu ul {
    list-style: none;
    display: flex;
    gap: 15px;
    margin: 0;
}

#navMenu ul li a {
    text-decoration: none;
    color: rgb(8, 8, 8);
    font-size: 13px;
}

/* Container */
.container {
    max-width: 700px;
    margin: 20px auto;
    background: rgb(232, 234, 235);
    padding: 20px;
}

/* List */
ul {
    list-style: none;
    padding: 0;
}

li {
    padding: 10px;
    margin: 10px 0;
    background: #b0d3dd;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Button group (alignment fix) */
li div {
    display: flex;
    gap: 6px;
}

/* Circular Buttons */
button {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    color: rgb(5, 5, 5);
    font-weight: bold;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

/* Colors */
.present { background: green; }
.absent { background: red; }
.leave { background: orange; }

/* Popup */
.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    background: white;
    padding: 20px;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">

    <nav id="navMenu">

<div class="container">

    <h2>Attendance Class I</h2>

    <button onclick="showAddStudentForm()" style="border-radius:5px;width:auto;height:auto;padding:6px 10px;">
        Add Student
    </button>

    <ul id="studentsList"></ul>

    <div>
        <h3>Summary</h3>
        <p>Total Students: <span id="totalStudents">0</span></p>
        <p>Present: <span id="totalPresent">0</span></p>
        <p>Absent: <span id="totalAbsent">0</span></p>
        <p>Leave: <span id="totalLeave">0</span></p>
    </div>

    <button onclick="submitAttendance()" style="border-radius:5px;width:auto;height:auto;padding:6px 10px;">
        Submit
    </button>

    <div id="resultSection" style="display:none;"></div>

</div>

<!-- Add Student Popup -->
<div id="addStudentPopup" class="popup">
    <h2>Add Student</h2>
    <input type="text" id="newStudentName" placeholder="Name"><br><br>
    <input type="text" id="newStudentRoll" placeholder="Roll No"><br><br>
    <button onclick="addStudent()" style="border-radius:5px;width:auto;height:auto;">Submit</button>
    <button onclick="closePopup()" style="border-radius:5px;width:auto;height:auto;">Cancel</button>
</div>

                { name: "Reshma", rollNumber: "2" },
                { name: "Manoj", rollNumber: "3" },
                { name: "Gayathri", rollNumber: "4" },
                { name: "Naveen", rollNumber: "5" },
            ]
        }));
    }
}

function showStudentsList() {

fetch("getStudents.php")
.then(res => res.json())
.then(data => {

const list = document.getElementById("studentsList");
list.innerHTML="";

data.forEach(st => {

let li = document.createElement("li");
li.innerHTML = `${st.name} (Roll ${st.roll_number})`;

let btnGroup = document.createElement("div");

btnGroup.appendChild(createBtn("P","present",()=>mark(li,"present",st.id)));
btnGroup.appendChild(createBtn("A","absent",()=>mark(li,"absent",st.id)));
btnGroup.appendChild(createBtn("L","leave",()=>mark(li,"leave",st.id)));

li.appendChild(btnGroup);
list.appendChild(li);

});

document.getElementById("totalStudents").innerText = data.length;

});
}
// Create Button
function createBtn(text, cls, fn) {
    let b = document.createElement("button");
    b.innerText = text;
    b.className = cls;
    b.onclick = fn;
    return b;
}

function mark(li,status,id){

// change row color
li.style.background =
status === "present" ? "lightgreen" :
status === "absent" ? "#ff9999" : "#ffe08a";

// save status in HTML
li.setAttribute("data-status", status);

// update summary
updateSummary();

// save to database
fetch("saveAttendance.php",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`student_id=${id}&status=${status}`
});

}
// Summary
function updateSummary() {
    let items = document.querySelectorAll("#studentsList li");

    let p = 0, a = 0, l = 0;

    items.forEach(i => {
        let s = i.getAttribute("data-status");
        if (s === "present") p++;
        else if (s === "absent") a++;
        else if (s === "leave") l++;
    });

    document.getElementById("totalStudents").innerText = items.length;
    document.getElementById("totalPresent").innerText = p;
    document.getElementById("totalAbsent").innerText = a;
    document.getElementById("totalLeave").innerText = l;
}

// Submit
function submitAttendance() {
    document.getElementById("resultSection").style.display = "block";
    document.getElementById("resultSection").innerHTML =
        "✅ Attendance Submitted Successfully!";
}

// Popup
function showAddStudentForm() {
    document.getElementById("addStudentPopup").style.display = "block";
}

function closePopup() {
    document.getElementById("addStudentPopup").style.display = "none";
}

function addStudent(){

let name = document.getElementById("newStudentName").value;
let roll = document.getElementById("newStudentRoll").value;

fetch("addStudent.php",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`name=${name}&roll=${roll}`
})
.then(()=>showStudentsList());

closePopup();
}
